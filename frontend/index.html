<!DOCTYPE html>
<html>
<head>
    <title>Mechanix</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin:0;
            font-family: Arial;
            background:#f0f2f5;
        }

        .nav {
            display:flex;
            background:#111;
        }

        .nav button {
            flex:1;
            padding:18px;
            font-size:18px;
            color:white;
            background:none;
            border:none;
        }

        .nav button.active {
            background:#007bff;
        }

        .screen {
            display:none;
            padding:15px;
        }

        .screen.active {
            display:block;
        }

        .card {
            background:white;
            padding:18px;
            margin-bottom:12px;
            border-radius:10px;
            font-size:16px;
        }

        .title {
            font-size:20px;
            font-weight:bold;
        }

        input, select {
            width:100%;
            padding:14px;
            font-size:16px;
            margin-bottom:12px;
        }

        button.primary {
            width:100%;
            padding:18px;
            font-size:18px;
            background:#007bff;
            color:white;
            border:none;
            border-radius:10px;
            margin-bottom:8px;
        }

        button.secondary {
            width:100%;
            padding:16px;
            font-size:16px;
            background:#ddd;
            border:none;
            border-radius:10px;
            margin-top:10px;
        }

        .status {
            padding:6px 10px;
            border-radius:6px;
            font-size:14px;
            display:inline-block;
        }

        .booked { background:#ccc; }
        .arrived { background:orange; color:white; }
        .in-progress { background:#007bff; color:white; }
        .pending-invoice { background:purple; color:white; }
        .completed { background:green; color:white; }

        img {
            width:100%;
            border-radius:8px;
            margin-top:10px;
        }
    </style>
</head>

<body>

<div class="nav">
    <button class="active" onclick="show('jobs', this)">Jobs</button>
    <button onclick="show('customers', this)">Customers</button>
    <button onclick="show('invoices', this)">Invoices</button>
</div>

<!-- JOBS -->
<div id="jobs" class="screen active">

    <div class="card">
        <div class="title">New Job</div>

        <input id="jobTitle" placeholder="Job Title">
        <select id="jobCustomer"></select>
        <select id="jobVehicle"></select>

        <button class="primary" onclick="createJob()">Create Job</button>
    </div>

    <div class="title">Jobs</div>
    <div id="jobList"></div>

</div>

<!-- JOB DETAIL -->
<div id="jobDetail" class="screen">

    <div id="jobInfo"></div>

    <div class="card">
        <div class="title">Actions</div>

        <button class="primary" onclick="setStatus('arrived')">Arrived</button>
        <button class="primary" onclick="startJob()">Start Job</button>
        <button class="primary" onclick="finishJob()">Finish Job</button>
        <button class="primary" onclick="createInvoice()">Create Invoice</button>
    </div>

    <div class="card">
        <div class="title">Photos</div>

        <input type="file" accept="image/*" onchange="uploadPhoto(event)">
        <div id="photoList"></div>
    </div>

    <button class="secondary" onclick="show('jobs')">Back</button>

</div>

<!-- CUSTOMERS -->
<div id="customers" class="screen">

    <div class="card">
        <div class="title">Add Customer</div>

        <input id="custName" placeholder="Name">
        <input id="custPhone" placeholder="Phone">

        <button class="primary" onclick="addCustomer()">Add Customer</button>
    </div>

    <div id="customerList"></div>

</div>

<!-- INVOICES -->
<div id="invoices" class="screen">
    <div class="title">Invoices</div>
    <div id="invoiceList"></div>
</div>

<script>

const API = "http://localhost:3000/api";
let currentJob = null;

function show(id, btn) {
    document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
    document.getElementById(id).classList.add("active");

    document.querySelectorAll(".nav button").forEach(b => b.classList.remove("active"));
    if(btn) btn.classList.add("active");
}

async function loadCustomers() {
    const res = await fetch(API + "/customers");
    const data = await res.json();

    let html = "", options = "";

    data.forEach(c => {
        html += `<div class="card">${c.firstName} - ${c.phone}</div>`;
        options += `<option value="${c._id}">${c.firstName}</option>`;
    });

    document.getElementById("customerList").innerHTML = html;
    document.getElementById("jobCustomer").innerHTML = options;
}

async function addCustomer() {
    const name = document.getElementById("custName").value;
    const phone = document.getElementById("custPhone").value;

    await fetch(API + "/customers", {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({ firstName:name, phone })
    });

    loadCustomers();
}

async function loadVehicles() {
    const res = await fetch(API + "/vehicles");
    const data = await res.json();

    let options = "";
    data.forEach(v => {
        options += `<option value="${v._id}">${v.make} ${v.model}</option>`;
    });

    document.getElementById("jobVehicle").innerHTML = options;
}

async function loadJobs() {
    const res = await fetch(API + "/jobs");
    const data = await res.json();

    let html = "";
    data.forEach(j => {
        html += `
        <div class="card" onclick="openJob('${j._id}')">
            <div class="title">${j.title}</div>
            <span class="status ${j.status}">${j.status}</span>
        </div>`;
    });

    document.getElementById("jobList").innerHTML = html;
}

async function createJob() {
    const title = document.getElementById("jobTitle").value;
    const customer = document.getElementById("jobCustomer").value;
    const vehicle = document.getElementById("jobVehicle").value;

    await fetch(API + "/jobs", {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({ title, customer, vehicle })
    });

    loadJobs();
}

async function openJob(id) {
    const res = await fetch(API + "/jobs/" + id);
    currentJob = await res.json();

    renderJob();
    show("jobDetail");
}

function renderJob() {
    document.getElementById("jobInfo").innerHTML = `
        <div class="card">
            <div class="title">${currentJob.title}</div>
            <span class="status ${currentJob.status}">${currentJob.status}</span>
        </div>
    `;

    let photos = "";
    if(currentJob.photos?.other){
        currentJob.photos.other.forEach(p => {
            photos += `<img src="${p}">`;
        });
    }

    document.getElementById("photoList").innerHTML = photos;
}

function uploadPhoto(event) {
    const file = event.target.files[0];
    const reader = new FileReader();

    reader.onload = async function(e) {
        if(!currentJob.photos) currentJob.photos = {};
        if(!currentJob.photos.other) currentJob.photos.other = [];

        currentJob.photos.other.push(e.target.result);

        await fetch(API + "/jobs/" + currentJob._id, {
            method:"PUT",
            headers:{ "Content-Type":"application/json" },
            body: JSON.stringify(currentJob)
        });

        renderJob();
    };

    reader.readAsDataURL(file);
}

async function setStatus(status) {
    currentJob.status = status;

    await fetch(API + "/jobs/" + currentJob._id, {
        method:"PUT",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify(currentJob)
    });

    loadJobs();
    openJob(currentJob._id);
}

async function startJob() {
    currentJob.status = "in-progress";
    currentJob.clockIn = new Date();

    await fetch(API + "/jobs/" + currentJob._id, {
        method:"PUT",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify(currentJob)
    });

    loadJobs();
    openJob(currentJob._id);
}

async function finishJob() {
    currentJob.status = "pending-invoice";
    currentJob.clockOut = new Date();

    await fetch(API + "/jobs/" + currentJob._id, {
        method:"PUT",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify(currentJob)
    });

    loadJobs();
    openJob(currentJob._id);
}

async function createInvoice() {
    await fetch(API + "/invoices/from-job/" + currentJob._id, {
        method:"POST"
    });

    loadInvoices();
}

async function loadInvoices() {
    const res = await fetch(API + "/invoices");
    const data = await res.json();

    let html = "";
    data.forEach(i => {
        html += `<div class="card">$${i.totalCost}</div>`;
    });

    document.getElementById("invoiceList").innerHTML = html;
}

loadCustomers();
loadVehicles();
loadJobs();
loadInvoices();

</script>

</body>
</html>
