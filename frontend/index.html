<!DOCTYPE html>
<html>
<head>
    <title>Mechanix</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body { margin:0; font-family: Arial; background:#f0f2f5; }

        .nav { display:flex; background:#111; }
        .nav button {
            flex:1; padding:18px; font-size:18px;
            color:white; background:none; border:none;
        }
        .nav button.active { background:#007bff; }

        .screen { display:none; padding:15px; }
        .screen.active { display:block; }

        .card {
            background:white;
            padding:18px;
            margin-bottom:12px;
            border-radius:10px;
        }

        .title { font-size:20px; font-weight:bold; }

        input, select {
            width:100%;
            padding:14px;
            margin-bottom:12px;
        }

        button.primary {
            width:100%;
            padding:18px;
            background:#007bff;
            color:white;
            border:none;
            border-radius:10px;
            margin-bottom:8px;
        }

        button.secondary {
            width:100%;
            padding:16px;
            background:#ddd;
            border:none;
            border-radius:10px;
        }

        .status {
            padding:6px 10px;
            border-radius:6px;
            display:inline-block;
        }

        .booked { background:#ccc; }
        .arrived { background:orange; color:white; }
        .in-progress { background:#007bff; color:white; }
        .pending-invoice { background:purple; color:white; }
        .completed { background:green; color:white; }

        img { width:100%; border-radius:8px; margin-top:10px; }
    </style>
</head>

<body>

<div class="nav">
    <button class="active" onclick="show('jobs', this)">Jobs</button>
    <button onclick="show('customers', this)">Customers</button>
    <button onclick="show('invoices', this)">Invoices</button>
</div>

<div id="jobs" class="screen active">
    <div class="card">
        <div class="title">New Job</div>
        <input id="jobTitle" placeholder="Job Title">
        <select id="jobCustomer" onchange="loadVehicles(this.value)"></select>
        <select id="jobVehicle"></select>
        <button class="primary" onclick="createJob()">Create Job</button>
    </div>

    <div class="title">Jobs</div>
    <div id="jobList"></div>
</div>

<div id="jobDetail" class="screen">
    <div id="jobInfo"></div>

    <div class="card">
        <div class="title">Quick Actions</div>
        <button class="primary" onclick="startJob()">▶ Start Job</button>
        <button class="primary" onclick="finishJob()">✔ Finish Job</button>
    </div>

    <div class="card">
        <div class="title">Status</div>
        <button class="primary" onclick="setStatus('arrived')">Arrived</button>
        <button class="primary" onclick="setStatus('completed')">Completed</button>
    </div>

    <div class="card">
        <div class="title">Photos</div>
        <input type="file" accept="image/*" onchange="uploadPhoto(event)">
        <div id="photoList"></div>
    </div>

    <div class="card">
        <div class="title">Finish</div>
        <button class="primary" onclick="createInvoice()">Create Invoice</button>
        <button class="primary" onclick="printJob()">Print Job Card</button>
    </div>

    <button class="secondary" onclick="show('jobs')">Back</button>
</div>

<!-- ✅ FIXED CUSTOMERS SECTION -->
<div id="customers" class="screen">

    <div class="card">
        <div class="title">Add Customer</div>
        <input id="custName" placeholder="Name">
        <input id="custPhone" placeholder="Phone">
        <button class="primary" onclick="addCustomer()">Add Customer</button>
    </div>

    <div class="card">
        <div class="title">Add Vehicle</div>
        <select id="vehicleCustomer"></select>
        <input id="vehicleMake" placeholder="Make">
        <input id="vehicleModel" placeholder="Model">
        <button class="primary" onclick="addVehicle()">Add Vehicle</button>
    </div>

    <div id="customerList"></div>

</div>

<div id="invoices" class="screen">
    <div class="title">Invoices</div>
    <div id="invoiceList"></div>
</div>

<script>

const API = "http://localhost:3000/api";
let currentJob = null;

function show(id, btn) {
    document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
    document.getElementById(id).classList.add("active");

    document.querySelectorAll(".nav button").forEach(b => b.classList.remove("active"));
    if(btn) btn.classList.add("active");

    if(id === "jobs") loadJobs();
    if(id === "customers") loadCustomers();
    if(id === "invoices") loadInvoices();
}

async function loadCustomers() {
    const res = await fetch(API + "/customers");
    const data = await res.json();

    let html = "", options = "";

    data.forEach(c => {
        html += `<div class="card">${c.firstName} - ${c.phone}</div>`;
        options += `<option value="${c._id}">${c.firstName}</option>`;
    });

    customerList.innerHTML = html;
    jobCustomer.innerHTML = options;
    vehicleCustomer.innerHTML = options;
}

async function addCustomer() {
    await fetch(API + "/customers", {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({
            firstName: custName.value,
            phone: custPhone.value
        })
    });

    custName.value = "";
    custPhone.value = "";

    loadCustomers();
}

async function addVehicle() {
    await fetch(API + "/vehicles", {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({
            customer: vehicleCustomer.value,
            make: vehicleMake.value,
            model: vehicleModel.value
        })
    });

    vehicleMake.value = "";
    vehicleModel.value = "";

    loadVehicles(vehicleCustomer.value);
}

async function loadVehicles(customerId = null) {
    const res = await fetch(API + "/vehicles");
    const data = await res.json();

    let options = "";
    data.forEach(v => {
        if (!customerId || v.customer === customerId) {
            options += `<option value="${v._id}">${v.make} ${v.model}</option>`;
        }
    });

    jobVehicle.innerHTML = options;
}

async function createJob() {
    const res = await fetch(API + "/jobs", {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({
            title: jobTitle.value,
            customer: jobCustomer.value,
            vehicle: jobVehicle.value
        })
    });

    const newJob = await res.json();

    jobTitle.value = "";
    jobCustomer.selectedIndex = 0;
    jobVehicle.selectedIndex = 0;

    loadJobs();
    openJob(newJob._id);
}

async function loadJobs() {
    const res = await fetch(API + "/jobs");
    const data = await res.json();

    let html = "";
    data.forEach(j => {
        let color = "#ccc";
        if(j.status === "arrived") color = "orange";
        if(j.status === "in-progress") color = "#007bff";
        if(j.status === "pending-invoice") color = "purple";
        if(j.status === "completed") color = "green";

        html += `
        <div class="card" onclick="openJob('${j._id}')" style="border-left:6px solid ${color}">
            <div class="title">${j.title}</div>
            <span class="status ${j.status}">${j.status}</span><br><br>
            <b>${j.customer?.firstName || "No customer"}</b><br>
            ${j.vehicle?.make || ""} ${j.vehicle?.model || ""}
        </div>`;
    });

    jobList.innerHTML = html;
}

async function openJob(id) {
    const res = await fetch(API + "/jobs/" + id);
    currentJob = await res.json();
    renderJob();
    show("jobDetail");
}

function renderJob() {
    jobInfo.innerHTML = `
        <div class="card">
            <div class="title">${currentJob.title}</div>
            <span class="status ${currentJob.status}">${currentJob.status}</span><br><br>
            <b>Customer:</b> ${currentJob.customer?.firstName || "N/A"}<br>
            <b>Vehicle:</b> ${currentJob.vehicle?.make || ""} ${currentJob.vehicle?.model || ""}
        </div>
    `;

    let photos = "";
    currentJob.photos?.other?.forEach(p => photos += `<img src="${p}">`);
    photoList.innerHTML = photos;
}

function uploadPhoto(e) {
    const reader = new FileReader();
    reader.onload = async x => {
        currentJob.photos ??= {};
        currentJob.photos.other ??= [];
        currentJob.photos.other.push(x.target.result);

        await fetch(API + "/jobs/" + currentJob._id, {
            method:"PUT",
            headers:{ "Content-Type":"application/json" },
            body: JSON.stringify(currentJob)
        });

        renderJob();
    };
    reader.readAsDataURL(e.target.files[0]);
}

async function setStatus(s) {
    currentJob.status = s;
    await saveJob();
}

async function startJob() {
    currentJob.status = "in-progress";
    currentJob.clockIn = new Date();
    await saveJob();
}

async function finishJob() {
    currentJob.status = "pending-invoice";
    currentJob.clockOut = new Date();
    await saveJob();
}

async function saveJob() {
    await fetch(API + "/jobs/" + currentJob._id, {
        method:"PUT",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify(currentJob)
    });

    loadJobs();
    openJob(currentJob._id);
}

async function createInvoice() {
    await fetch(API + "/invoices/from-job/" + currentJob._id, { method:"POST" });
    loadInvoices();
}

async function loadInvoices() {
    const res = await fetch(API + "/invoices");
    const data = await res.json();
    invoiceList.innerHTML = data.map(i => `<div class="card">$${i.totalCost}</div>`).join("");
}

loadCustomers();
loadVehicles();
loadJobs();
loadInvoices();

    function printJob() {

    const w = window.open("", "_blank");

    w.document.write(`
    <html>
    <head>
        <title>Job Card</title>
        <style>
            body { font-family: Arial; padding:20px; }
            .section { margin-top:20px; }
            .box { border:1px solid #000; height:80px; margin-top:5px; }
        </style>
    </head>
    <body>

        <h1>${currentJob.title}</h1>
        <b>Status:</b> ${currentJob.status}<br><br>

        <b>Customer:</b> ${currentJob.customer?.firstName || "N/A"}<br>
        <b>Vehicle:</b> ${currentJob.vehicle?.make || ""} ${currentJob.vehicle?.model || ""}

        <div class="section">
            <h3>Technician Notes</h3>
            <div class="box"></div>
        </div>

        <div class="section">
            <h3>Work Carried Out</h3>
            <div class="box"></div>
        </div>

        <div class="section">
            <h3>Parts Used</h3>
            <div class="box"></div>
        </div>

        <div class="section">
            <h3>Sign Off</h3>
            Technician: ____________<br><br>
            Customer: ____________
        </div>

    </body>
    </html>
    `);

    w.document.close();
    w.print();
}
</script>

</body>
</html>
