<!DOCTYPE html>
<html>
<head>
    <title>Mechanix</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body { margin:0; font-family:Arial; background:#f4f4f4; }

        .nav { display:flex; background:#222; }
        .nav button {
            flex:1; padding:15px; border:none;
            background:none; color:white;
        }
        .nav button.active { background:#007bff; }

        .screen { display:none; padding:15px; }
        .screen.active { display:block; }

        .card {
            background:white;
            padding:15px;
            margin-bottom:10px;
            border-radius:8px;
        }

        input, select {
            width:100%;
            padding:10px;
            margin-bottom:10px;
        }

        button.primary {
            width:100%;
            padding:15px;
            background:#007bff;
            color:white;
            border:none;
        }

        img {
            width:100%;
            margin-top:10px;
            border-radius:8px;
        }
    </style>
</head>

<body>

<div class="nav">
    <button class="active" onclick="show('jobs', this)">Jobs</button>
    <button onclick="show('customers', this)">Customers</button>
    <button onclick="show('invoices', this)">Invoices</button>
</div>

<div id="jobs" class="screen active">
    <h2>Create Job</h2>

    <input id="jobTitle" placeholder="Job Title">
    <select id="jobCustomer"></select>
    <select id="jobVehicle"></select>

    <button class="primary" onclick="createJob()">Create Job</button>

    <h3>Jobs</h3>
    <div id="jobList"></div>
</div>

<div id="jobDetail" class="screen">
    <h2>Job Detail</h2>

    <div id="jobInfo"></div>

    <h3>Add Photo</h3>
    <input type="file" accept="image/*" onchange="uploadPhoto(event)">

    <div id="photoList"></div>

    <button class="primary" onclick="setStatus('arrived')">Arrived</button>
    <button class="primary" onclick="startJob()">Start Job</button>
    <button class="primary" onclick="finishJob()">Finish Job</button>
    <button class="primary" onclick="createInvoice()">Create Invoice</button>

    <br><br>
    <button onclick="show('jobs')">Back</button>
</div>

<div id="customers" class="screen">
    <h2>Add Customer</h2>

    <input id="custName" placeholder="Name">
    <input id="custPhone" placeholder="Phone">

    <button class="primary" onclick="addCustomer()">Add</button>

    <div id="customerList"></div>
</div>

<div id="invoices" class="screen">
    <h2>Invoices</h2>
    <div id="invoiceList"></div>
</div>

<script>

const API = "http://localhost:3000/api";
let currentJob = null;

// NAV
function show(id, btn) {
    document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
    document.getElementById(id).classList.add("active");

    document.querySelectorAll(".nav button").forEach(b => b.classList.remove("active"));
    if(btn) btn.classList.add("active");
}

// CUSTOMERS
async function loadCustomers() {
    const res = await fetch(API + "/customers");
    const data = await res.json();

    let html = "";
    let options = "";

    data.forEach(c => {
        html += `<div class="card">${c.firstName} - ${c.phone}</div>`;
        options += `<option value="${c._id}">${c.firstName}</option>`;
    });

    document.getElementById("customerList").innerHTML = html;
    document.getElementById("jobCustomer").innerHTML = options;
}

async function addCustomer() {
    const name = document.getElementById("custName").value;
    const phone = document.getElementById("custPhone").value;

    await fetch(API + "/customers", {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({ firstName:name, phone })
    });

    loadCustomers();
}

// VEHICLES
async function loadVehicles() {
    const res = await fetch(API + "/vehicles");
    const data = await res.json();

    let options = "";
    data.forEach(v => {
        options += `<option value="${v._id}">${v.make} ${v.model}</option>`;
    });

    document.getElementById("jobVehicle").innerHTML = options;
}

// JOBS
async function loadJobs() {
    const res = await fetch(API + "/jobs");
    const data = await res.json();

    let html = "";
    data.forEach(j => {
        html += `
        <div class="card" onclick="openJob('${j._id}')">
            <b>${j.title}</b><br>
            ${j.status}
        </div>`;
    });

    document.getElementById("jobList").innerHTML = html;
}

async function createJob() {
    const title = document.getElementById("jobTitle").value;
    const customer = document.getElementById("jobCustomer").value;
    const vehicle = document.getElementById("jobVehicle").value;

    await fetch(API + "/jobs", {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({ title, customer, vehicle })
    });

    loadJobs();
}

async function openJob(id) {
    const res = await fetch(API + "/jobs/" + id);
    currentJob = await res.json();

    renderJob();
    show("jobDetail");
}

function renderJob() {
    document.getElementById("jobInfo").innerHTML = `
        <div class="card">
            <b>${currentJob.title}</b><br>
            Status: ${currentJob.status}
        </div>
    `;

    let photos = "";
    if(currentJob.photos && currentJob.photos.other){
        currentJob.photos.other.forEach(p => {
            photos += `<img src="${p}">`;
        });
    }

    document.getElementById("photoList").innerHTML = photos;
}

// PHOTO UPLOAD
function uploadPhoto(event) {
    const file = event.target.files[0];
    const reader = new FileReader();

    reader.onload = async function(e) {
        if(!currentJob.photos) currentJob.photos = {};
        if(!currentJob.photos.other) currentJob.photos.other = [];

        currentJob.photos.other.push(e.target.result);

        await fetch(API + "/jobs/" + currentJob._id, {
            method:"PUT",
            headers:{ "Content-Type":"application/json" },
            body: JSON.stringify(currentJob)
        });

        renderJob();
    };

    reader.readAsDataURL(file);
}

// STATUS
async function setStatus(status) {
    currentJob.status = status;

    await fetch(API + "/jobs/" + currentJob._id, {
        method:"PUT",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify(currentJob)
    });

    loadJobs();
    openJob(currentJob._id);
}

async function startJob() {
    currentJob.status = "in-progress";
    currentJob.clockIn = new Date();

    await fetch(API + "/jobs/" + currentJob._id, {
        method:"PUT",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify(currentJob)
    });

    loadJobs();
    openJob(currentJob._id);
}

async function finishJob() {
    currentJob.status = "pending-invoice";
    currentJob.clockOut = new Date();

    await fetch(API + "/jobs/" + currentJob._id, {
        method:"PUT",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify(currentJob)
    });

    loadJobs();
    openJob(currentJob._id);
}

async function createInvoice() {
    await fetch(API + "/invoices/from-job/" + currentJob._id, {
        method:"POST"
    });

    loadInvoices();
}

// INVOICES
async function loadInvoices() {
    const res = await fetch(API + "/invoices");
    const data = await res.json();

    let html = "";
    data.forEach(i => {
        html += `<div class="card">$${i.totalCost}</div>`;
    });

    document.getElementById("invoiceList").innerHTML = html;
}

// LOAD
loadCustomers();
loadVehicles();
loadJobs();
loadInvoices();

</script>

</body>
</html>
