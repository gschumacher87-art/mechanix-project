<!DOCTYPE html>
<html>
<head>
    <title>Mechanix</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="styles.css">
</head>

<body>
    
<div id="loginScreen">

    <div id="intro">

        <div id="brandTop">SCHUMACHER</div>

        <div id="wmsStack">
            <div class="wms-line" id="lineW">W</div>
            <div class="wms-line" id="lineM">M</div>
            <div class="wms-line" id="lineS">S</div>
        </div>

    </div>

    <div class="card">
        <div class="title">Login</div>

        <input id="loginEmail" placeholder="Email">
        <input id="loginPassword" type="password" placeholder="Password">

        <button class="primary" onclick="login()">Login</button>

        <div id="loginError" style="color:red;"></div>
    </div>

</div>

<div id="app" style="display:none;">

<div class="nav">
    <button class="active" onclick="show('bookings', this)">Bookings</button>
    <button onclick="show('jobs', this)">Jobs</button>
    <button onclick="show('customers', this)">Customers</button>
    <button onclick="show('invoices', this)">Invoices</button>
    <button onclick="show('templates', this)">Repair Types</button>
</div>

<div id="bookings" class="screen active">
    <div class="title">Bookings</div>

    <div class="booking-columns">

        <div class="booking-column">
            <div class="title">Today</div>
            <div id="todayList"></div>
        </div>

        <div class="booking-column">
            <div class="title">Upcoming</div>
            <div id="futureList"></div>
        </div>

        <div class="booking-column">
    <div class="title">Calendar</div>
    <div id="calendar"></div>
</div>

    </div>
</div>

<div id="jobs" class="screen">
    <div class="title">Jobs</div>
    <div id="jobList"></div>
</div>

<div id="jobCard" class="screen">
    <div id="jobCardInfo"></div>

    <div class="card">
        <div class="title">Checklist</div>
        <div id="jobCardChecklist"></div>
    </div>

    <div class="card">
        <div class="title">Actions</div>
        <div id="jobCardActions"></div>
    </div>

    <button class="secondary" onclick="show('jobs')">Back</button>
</div>

<div id="jobDetail" class="screen">
    <div id="jobInfo"></div>

    <div class="card">
        <div class="title">Quick Actions</div>
        <div id="quickActions"></div>
    </div>

    <div class="card">
        <div class="title">Status</div>
        <button class="primary" onclick="setStatus('arrived')">Arrived</button>
        <button class="primary" onclick="setStatus('completed')">Completed</button>
    </div>

    <div class="card">
        <div class="title">Photos</div>
        <input type="file" accept="image/*" onchange="uploadPhoto(event)">
        <div id="photoList"></div>
    </div>

    <div class="card">
        <div class="title">Notes</div>
        <textarea id="jobNotes"></textarea>
        <button class="primary" onclick="saveNotes()">Save Notes</button>
    </div>

    <button class="secondary" onclick="show('jobs')">Back</button>
</div>

<div id="customers" class="screen">
    <div class="card">
        <div class="filter-row">

            <select id="customerSearchBy">
                <option value="firstName">First</option>
                <option value="lastName">Last</option>
                <option value="phone">Phone</option>
                <option value="rego">Rego</option>
            </select>

            <input id="customerSearchInput" placeholder="Search...">

            <button class="primary" onclick="searchCustomers()">
                Search
            </button>

        </div>

        <div id="customerSearchResults"></div>
    </div>

    <div id="customerList"></div>
    <div id="customerDetail" style="display:none;"></div>
</div>

<div id="invoices" class="screen">
    <div class="title">Invoices</div>
    <div id="invoiceList"></div>
</div>

<div id="templates" class="screen">
    <div class="title">Repair Types</div>

    <button class="primary" onclick="document.getElementById('createTemplateModal').style.display='block'">
    + New Template
</button>

    <div id="templateList"></div>
</div>

<div id="bookingModal" class="modal">
    <div class="modal-content">

        <div class="title">Booking Request</div>

        <div class="booking-grid">

            <!-- LEFT COLUMN -->
            <div>

                <div class="card">
    <div class="title">Appointment</div>

    <input type="date" id="bookingDate">

    <div id="jobsContainer"></div>

    <button class="secondary" onclick="addJob()">+ Add Job</button>
            
                </div>

                <div class="card">
                    <div class="title">Vehicle</div>

                    <select id="bookingVehicle"></select>
                </div>

            </div>

            <!-- RIGHT COLUMN -->
            <div>

                <div class="card">
    <div class="title">Customer</div>

    <button class="primary" onclick="openBookingCustomerSearch()">
        Find Customer
    </button>

    <input id="displayFirstName" placeholder="First Name" disabled>
    <input id="displayLastName" placeholder="Last Name" disabled>
    <input id="displayPhone" placeholder="Contact Number" disabled>
    <input id="displayRego" placeholder="Rego" disabled>

</div>

                <div class="card">
                    <div class="title">Notes</div>

                    <textarea id="bookingNote" placeholder="Notes"></textarea>
                </div>

            </div>

        </div>

        <button class="primary" onclick="confirmBooking()">Create Booking</button>
        <button class="secondary" onclick="closeBookingModal()">Close</button>

    </div>
</div>

<div id="customerPopup" class="modal">
    <div class="modal-content">

        <div class="title">Find Customer</div>

        <input id="searchFirstName" placeholder="First Name">
        <input id="searchLastName" placeholder="Last Name">
        <input id="searchPhone" placeholder="Contact Number">
        <input id="searchRego" placeholder="Rego">

        <button class="primary" onclick="bookingSearchCustomers()">
            Search
        </button>

        <div id="customerPopupList"></div>

        <button class="secondary" onclick="closeCustomerPopup()">Close</button>

    </div>
</div>

<div id="createCustomerModal" class="modal">
    <div class="modal-content">

        <div class="title">Create Customer</div>

        <input id="newFirstName" placeholder="First Name">
        <input id="newLastName" placeholder="Last Name">
        <input id="newPhone" placeholder="Phone">

        <div class="title">Vehicle</div>

        <input id="newMake" placeholder="Make">
        <input id="newModel" placeholder="Model">
        <input id="newRego" placeholder="Rego">

        <button class="primary" onclick="createCustomer()">Create</button>
        <button class="secondary" onclick="document.getElementById('createCustomerModal').style.display='none'">Cancel</button>

    </div>
</div>

<div id="templateModal" class="modal">
    <div class="modal-content">

        <div class="title">Select Template</div>

<div id="templateListModal"></div>

<button class="secondary" onclick="closeTemplateModal()">Close</button>

    </div>
</div>

<div id="createTemplateModal" class="modal">
    <div class="modal-content">

        <div class="title">New Template</div>

        <input id="templateName" placeholder="Name">
        <input id="templateDesc" placeholder="Description">

        <button class="primary" onclick="saveTemplate()">Save</button>
        <button class="secondary" onclick="document.getElementById('createTemplateModal').style.display='none'">Cancel</button>

    </div>
</div>

<script src="app.js?v=1"></script>
<script src="customers.js?v=1"></script>
<script src="jobs.js?v=1"></script>
<script src="bookings.js?v=2"></script>
<script src="invoices.js?v=1"></script>
<script src="templates.js?v=2"></script>

</div>
</body>
</html>
